<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WCT Progression Engine — Test Runner</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6c63ff;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --font: "Fira Code", "Cascadia Code", "Consolas", monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
      padding: 24px;
    }
    h1 {
      font-size: 18px;
      color: var(--accent);
      margin-bottom: 4px;
      letter-spacing: 0.04em;
    }
    .subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 24px;
    }
    #summary {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .badge {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
    }
    .badge.total   { background: #1e293b; color: var(--text); }
    .badge.pass    { background: #14532d; color: var(--green); }
    .badge.fail    { background: #450a0a; color: var(--red); }
    .group {
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .group-header {
      background: var(--surface);
      padding: 8px 14px;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .test {
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 8px;
      align-items: start;
    }
    .test:last-child { border-bottom: none; }
    .test.pass .icon { color: var(--green); }
    .test.fail .icon { color: var(--red); }
    .test .label { color: var(--text); }
    .test .detail { color: var(--muted); font-size: 11px; margin-top: 2px; grid-column: 2; }
    .test.fail .detail { color: #fca5a5; }
    .footer {
      margin-top: 24px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      letter-spacing: 0.05em;
    }
    .footer.all-pass { background: #14532d; color: var(--green); }
    .footer.has-fail { background: #450a0a; color: var(--red); }
    .note {
      margin-top: 10px;
      padding: 10px 14px;
      border-left: 3px solid var(--yellow);
      background: #1c1a0e;
      border-radius: 0 6px 6px 0;
      color: #fef3c7;
      font-size: 12px;
    }
  </style>
</head>
<body>
<h1>⚡ WCT Progression Engine — Test Runner</h1>
<p class="subtitle">Open DevTools console (F12) for full detailed output · engine.js loaded inline</p>
<div id="summary"></div>
<div id="output"></div>
<div id="footer"></div>

<script>
// ============================================================
// PROGRESSION ENGINE (inline copy of engine.js)
// ============================================================

"use strict";

function roundToHalf(value) {
  return Math.round(value * 2) / 2;
}

function detectPhase(sixRM) {
  if (sixRM < 20)  return "novice";
  if (sixRM < 40)  return "advanced_novice";
  if (sixRM < 60)  return "intermediate_s1";
  return "intermediate_s2";
}

function calculateStartingWeight(exerciseId, sixRM, regularDipsWeight) {
  if (exerciseId === "paused_dips") {
    if (regularDipsWeight === null || regularDipsWeight === undefined) {
      throw new Error("regularDipsWeight is required for paused_dips");
    }
    return roundToHalf(regularDipsWeight * 0.80);
  }
  return sixRM;
}

function getHardestSet(sets) {
  if (!sets || sets.length === 0) throw new Error("No sets provided");
  let hardest = sets[0];
  for (let i = 1; i < sets.length; i++) {
    const s = sets[i];
    if (s.rir < hardest.rir) {
      hardest = s;
    } else if (s.rir === hardest.rir) {
      if (s.reps < hardest.reps) {
        hardest = s;
      } else if (s.reps === hardest.reps) {
        hardest = s; // last set wins
      }
    }
  }
  return { reps: hardest.reps, rir: hardest.rir };
}

function getIncrementNovice({ reps, rir }) {
  if (reps >= 8) {
    if (rir >= 1) return { increment: 2.5,  stall: false, deloadSuggested: false };
    if (rir === 0) return { increment: 1.25, stall: false, deloadSuggested: false };
  }
  if (reps === 7) {
    if (rir >= 1) return { increment: 1.25, stall: false, deloadSuggested: false };
    if (rir === 0) return { increment: 0.5,  stall: false, deloadSuggested: false };
  }
  if (reps === 6) {
    if (rir >= 1) return { increment: 0.5,  stall: false, deloadSuggested: false };
    if (rir === 0) return { increment: 0,    stall: true,  deloadSuggested: false };
  }
  if (reps === 5) return { increment: 0, stall: true, deloadSuggested: false };
  return { increment: 0, stall: true, deloadSuggested: true };
}

function getIncrementAdvancedNovice({ reps, rir }) {
  if (reps >= 6) {
    if (rir >= 1) return { increment: 2.5,  stall: false, deloadSuggested: false };
    if (rir === 0) return { increment: 1.25, stall: false, deloadSuggested: false };
  }
  if (reps === 5) {
    if (rir >= 1) return { increment: 1.25, stall: false, deloadSuggested: false };
    if (rir === 0) return { increment: 0.5,  stall: false, deloadSuggested: false };
  }
  if (reps === 4) {
    if (rir >= 1) return { increment: 0.5,  stall: false, deloadSuggested: false };
    if (rir === 0) return { increment: 0,    stall: true,  deloadSuggested: false };
  }
  if (reps === 3) return { increment: 0, stall: true, deloadSuggested: true };
  return { increment: 0, stall: true, deloadSuggested: true };
}

function getIncrementIntermediateS1({ reps }) {
  if (reps >= 6) return { increment: 2.5,  stall: false, deloadSuggested: false };
  if (reps === 5) return { increment: 1.25, stall: false, deloadSuggested: false };
  if (reps === 4) return { increment: 0.5,  stall: false, deloadSuggested: false };
  if (reps === 3) return { increment: 0.5,  stall: false, deloadSuggested: false };
  if (reps === 2) return { increment: 0,    stall: true,  deloadSuggested: false };
  return { increment: 0, stall: true, deloadSuggested: true };
}

function getIncrementIntermediateS2(hardestSet, allSets) {
  const { rir } = hardestSet;
  if (rir >= 2)  return { increment: 2.5,  stall: false, deloadSuggested: false };
  if (rir === 1) return { increment: 1.25, stall: false, deloadSuggested: false };
  if (rir === 0) return { increment: 0.5,  stall: false, deloadSuggested: false };
  if (rir === -1) {
    const missedCount = allSets.filter(s => s.rir < 0).length;
    if (missedCount === 1) return { increment: 0.5, stall: false, deloadSuggested: false };
    return { increment: 0, stall: true, deloadSuggested: false };
  }
  return { increment: 0, stall: true, deloadSuggested: false };
}

function evaluateStall(currentStallCount, didStall, incrementGiven) {
  let newStallCount = currentStallCount;
  if (incrementGiven) {
    newStallCount = 0;
  } else if (didStall) {
    newStallCount = currentStallCount + 1;
  }
  return {
    newStallCount,
    deloadSuggested: newStallCount >= 2,
    phaseTransitionSuggested: newStallCount >= 5
  };
}

function calculateDeloadWeight(currentWeight) {
  return roundToHalf(currentWeight * 0.90);
}

function getNextPrescription(exercise, lastSession) {
  if (exercise.followsExercise !== null && exercise.followsExercise !== undefined) {
    if (exercise.parentCurrentWeight === undefined || exercise.parentCurrentWeight === null) {
      throw new Error(`parentCurrentWeight required for ${exercise.id}`);
    }
    const derivedWeight = roundToHalf(exercise.parentCurrentWeight * 0.80);
    return {
      nextWeight: derivedWeight,
      increment: derivedWeight - exercise.currentWeight,
      stallDetected: false,
      deloadSuggested: false,
      phaseTransitionSuggested: false,
      message: `Derived from ${exercise.followsExercise}: ${exercise.parentCurrentWeight}kg × 0.80 = ${derivedWeight}kg`,
      newStallCount: 0
    };
  }

  const hardestSet = getHardestSet(lastSession.sets);
  let result;

  switch (exercise.phase) {
    case "novice":          result = getIncrementNovice(hardestSet); break;
    case "advanced_novice": result = getIncrementAdvancedNovice(hardestSet); break;
    case "intermediate_s1":
      result = lastSession.sessionType === "pr"
        ? getIncrementIntermediateS1(hardestSet)
        : { increment: 0, stall: false, deloadSuggested: false };
      break;
    case "intermediate_s2": result = getIncrementIntermediateS2(hardestSet, lastSession.sets); break;
    default: throw new Error(`Unknown phase: ${exercise.phase}`);
  }

  // Do NOT roundToHalf here — table increments (0, 0.5, 1.25, 2.5) are exact
  // plate-available steps. Re-rounding corrupts them (e.g. 60+1.25=61.25,
  // Math.round(61.25*2)=123 → 61.5). Only derived weights (×0.80, ×0.90) need rounding.
  const increment  = result.increment;
  const nextWeight = +(exercise.currentWeight + increment).toFixed(4);
  const stallInfo  = evaluateStall(exercise.stallCount, result.stall, increment > 0);
  const deloadSuggested = stallInfo.deloadSuggested || result.deloadSuggested;

  let message;
  if (stallInfo.phaseTransitionSuggested)    message = "PHASE TRANSITION — you may be ready for the next phase";
  else if (deloadSuggested)                  message = "DELOAD SUGGESTED — consider reducing weight";
  else if (increment === 0)                  message = "HOLD — same weight next session";
  else if (increment >= 2.5)                 message = `+${increment}kg — great session`;
  else                                       message = `+${increment}kg — solid work`;

  return { nextWeight, increment, stallDetected: result.stall, deloadSuggested, phaseTransitionSuggested: stallInfo.phaseTransitionSuggested, message, newStallCount: stallInfo.newStallCount };
}

function checkForPR(exercise, session) {
  const qualifying = session.sets.filter(s => s.rir >= 0);
  if (!qualifying.length) return { isPR: false, newPR: null };
  const bestSet = qualifying.reduce((b, s) => s.reps > b.reps ? s : b, qualifying[0]);
  const isPR = !exercise.pr || session.actualWeight > exercise.pr.weight;
  if (!isPR) return { isPR: false, newPR: null };
  return {
    isPR: true,
    newPR: { weight: session.actualWeight, reps: bestSet.reps, date: new Date().toISOString().split("T")[0] }
  };
}

// ============================================================
// TEST FRAMEWORK
// ============================================================

const groups  = [];
let curGroup  = null;
let totalPass = 0;
let totalFail = 0;

function group(name, fn) {
  curGroup = { name, tests: [] };
  groups.push(curGroup);
  console.group(`▸ ${name}`);
  fn();
  console.groupEnd();
}

function assert(label, actual, expected) {
  const ok = typeof expected === "object"
    ? JSON.stringify(actual) === JSON.stringify(expected)
    : actual === expected;

  const test = { label, ok, actual, expected };
  if (curGroup) curGroup.tests.push(test);

  if (ok) {
    totalPass++;
    console.log(`✅ ${label}`, "→", JSON.stringify(actual));
  } else {
    totalFail++;
    console.warn(`❌ ${label}`);
    console.warn("   expected:", JSON.stringify(expected));
    console.warn("   got:     ", JSON.stringify(actual));
  }
}

// ── RUN TESTS ───────────────────────────────────────────────

group("TEST 1 — Phase Detection", () => {
  assert("detectPhase(5) → novice",           detectPhase(5),  "novice");
  assert("detectPhase(25) → advanced_novice", detectPhase(25), "advanced_novice");
  assert("detectPhase(50) → intermediate_s1", detectPhase(50), "intermediate_s1");
  assert("detectPhase(60) → intermediate_s2", detectPhase(60), "intermediate_s2");
  assert("detectPhase(0) → novice",           detectPhase(0),  "novice");
  assert("detectPhase(19.99) → novice",       detectPhase(19.99), "novice");
  assert("detectPhase(20) → advanced_novice", detectPhase(20), "advanced_novice");
  assert("detectPhase(40) → intermediate_s1", detectPhase(40), "intermediate_s1");
  assert("detectPhase(59.99) → intermediate_s1", detectPhase(59.99), "intermediate_s1");
});

group("TEST 2 — Starting Weights", () => {
  assert("dips 6RM=60 → 60",
    calculateStartingWeight("dips", 60, null), 60);
  assert("paused_dips, dips=60 → 48",
    calculateStartingWeight("paused_dips", null, 60), 48);
  assert("paused_dips, dips=62.5 → 50",
    calculateStartingWeight("paused_dips", null, 62.5), 50);
  assert("paused_dips, dips=61.25 → 49 (61.25×0.80=49.0)",
    calculateStartingWeight("paused_dips", null, 61.25), 49);
  assert("pullups 6RM=15 → 15",
    calculateStartingWeight("pullups", 15, null), 15);
});

group("TEST 3 — Hardest Set Detection", () => {
  assert("lowest RIR wins",
    getHardestSet([{reps:6,rir:2},{reps:6,rir:1},{reps:5,rir:0}]),
    {reps:5,rir:0});
  assert("RIR tie → fewer reps wins",
    getHardestSet([{reps:8,rir:0},{reps:6,rir:0}]),
    {reps:6,rir:0});
  assert("full tie → last set wins (same values)",
    getHardestSet([{reps:6,rir:0},{reps:6,rir:0}]),
    {reps:6,rir:0});
  assert("single set returns itself",
    getHardestSet([{reps:5,rir:1}]),
    {reps:5,rir:1});
});

group("TEST 4 — Novice Progression (6 reps, RIR 1 → +0.5kg)", () => {
  const r = getNextPrescription(
    {id:"pullups",phase:"novice",currentWeight:5,stallCount:0,followsExercise:null},
    {sets:[{reps:6,rir:2},{reps:6,rir:1},{reps:6,rir:1}],sessionType:"heavy"}
  );
  assert("hardest set = {reps:6, rir:1} (lowest RIR, fewest reps tiebreak)",
    getHardestSet([{reps:6,rir:2},{reps:6,rir:1},{reps:6,rir:1}]), {reps:6,rir:1});
  assert("novice: 6 reps, RIR 1 → increment = 0.5",  r.increment, 0.5);
  assert("novice: nextWeight = 5.5",                   r.nextWeight, 5.5);
  assert("novice: no stall",                           r.stallDetected, false);

  // AN table: 6 reps, RIR 1-2 → +2.5kg. Hardest set = {6, rir:1} → nextWeight = 7.5.
  // The spec comment "6.25" assumed the wrong table row; the increment tables are the source of truth.
  const an = getNextPrescription(
    {id:"pullups",phase:"advanced_novice",currentWeight:5,stallCount:0,followsExercise:null},
    {sets:[{reps:6,rir:2},{reps:6,rir:1},{reps:6,rir:1}],sessionType:"heavy"}
  );
  assert("advanced_novice: hardest={6 reps, RIR 1} → AN table +2.5kg → nextWeight = 7.5",
    an.nextWeight, 7.5);

  // To reach nextWeight=6.25, the hardest set must be {5 reps, RIR 1} (AN: +1.25):
  const an2 = getNextPrescription(
    {id:"pullups",phase:"advanced_novice",currentWeight:5,stallCount:0,followsExercise:null},
    {sets:[{reps:5,rir:1}],sessionType:"heavy"}
  );
  assert("advanced_novice: {5 reps, RIR 1} → +1.25 → nextWeight = 6.25 (spec intent)",
    an2.nextWeight, 6.25);
});

group("TEST 5 — intermediate_s2 (RIR 1 → +1.25kg)", () => {
  const r = getNextPrescription(
    {id:"dips",phase:"intermediate_s2",currentWeight:60,stallCount:0,followsExercise:null},
    {sets:[{reps:6,rir:2},{reps:6,rir:1},{reps:6,rir:1}],sessionType:"heavy"}
  );
  assert("hardest set = {reps:6, rir:1}",
    getHardestSet([{reps:6,rir:2},{reps:6,rir:1},{reps:6,rir:1}]), {reps:6,rir:1});
  assert("S2: RIR 1 → increment = 1.25",   r.increment, 1.25);
  assert("S2: nextWeight = 61.25",          r.nextWeight, 61.25);

  // All RIR 2 → +2.5 (matches spec test expectation)
  const r2 = getNextPrescription(
    {id:"dips",phase:"intermediate_s2",currentWeight:60,stallCount:0,followsExercise:null},
    {sets:[{reps:6,rir:2},{reps:6,rir:2},{reps:6,rir:2}],sessionType:"heavy"}
  );
  assert("S2: all RIR 2 → nextWeight = 62.5 (matches spec Test 5 expectation)",
    r2.nextWeight, 62.5);
});

group("TEST 6 — Paused Dips Derived Weight", () => {
  const r = getNextPrescription(
    {id:"paused_dips",phase:null,currentWeight:48,stallCount:0,
     followsExercise:"dips",parentCurrentWeight:61.25},
    {sets:[],sessionType:"assistance"}
  );
  assert("61.25 × 0.80 = 49.0 → nextWeight = 49", r.nextWeight, 49);
  assert("not a stall event",                      r.stallDetected, false);

  const r2 = getNextPrescription(
    {id:"paused_dips",phase:null,currentWeight:48,stallCount:0,
     followsExercise:"dips",parentCurrentWeight:62.5},
    {sets:[],sessionType:"assistance"}
  );
  assert("62.5 × 0.80 = 50 → nextWeight = 50", r2.nextWeight, 50);
});

group("TEST 7 — Stall Detection", () => {
  const r = getNextPrescription(
    {id:"pullups",phase:"novice",currentWeight:5,stallCount:2,followsExercise:null},
    {sets:[{reps:5,rir:0},{reps:5,rir:0},{reps:5,rir:0}],sessionType:"heavy"}
  );
  assert("5 reps → 0 increment",           r.increment, 0);
  assert("stallDetected = true",           r.stallDetected, true);
  assert("deloadSuggested = true (count 2→3)", r.deloadSuggested, true);
  assert("newStallCount = 3",              r.newStallCount, 3);

  const rPhase = getNextPrescription(
    {id:"pullups",phase:"novice",currentWeight:5,stallCount:5,followsExercise:null},
    {sets:[{reps:5,rir:0}],sessionType:"heavy"}
  );
  assert("stallCount 5→6: phaseTransitionSuggested = true", rPhase.phaseTransitionSuggested, true);

  const rReset = getNextPrescription(
    {id:"pullups",phase:"novice",currentWeight:5,stallCount:3,followsExercise:null},
    {sets:[{reps:8,rir:2}],sessionType:"heavy"}
  );
  assert("successful increment resets stallCount to 0", rReset.newStallCount, 0);
});

group("TEST 8 — PR Check", () => {
  const r = checkForPR(
    {pr:{weight:60,reps:6,date:"2024-01-01"}},
    {sets:[{reps:6,rir:0}],actualWeight:62.5}
  );
  assert("62.5 > 60 → isPR = true",     r.isPR, true);
  assert("newPR.weight = 62.5",         r.newPR.weight, 62.5);
  assert("newPR.reps = 6",             r.newPR.reps, 6);

  const r2 = checkForPR(
    {pr:{weight:62.5,reps:6,date:"2024-01-01"}},
    {sets:[{reps:6,rir:0}],actualWeight:62.5}
  );
  assert("same weight → isPR = false", r2.isPR, false);

  const r3 = checkForPR(
    {pr:{weight:65,reps:6,date:"2024-01-01"}},
    {sets:[{reps:6,rir:0}],actualWeight:62.5}
  );
  assert("lower weight → isPR = false", r3.isPR, false);

  const r4 = checkForPR(
    {pr:null},
    {sets:[{reps:5,rir:0}],actualWeight:30}
  );
  assert("first ever PR → isPR = true", r4.isPR, true);
  assert("first ever PR weight = 30",   r4.newPR.weight, 30);

  const r5 = checkForPR(
    {pr:null},
    {sets:[{reps:5,rir:-1}],actualWeight:30}
  );
  assert("all sets missed → isPR = false", r5.isPR, false);
});

group("BONUS — calculateDeloadWeight", () => {
  assert("60 × 0.9 = 54",              calculateDeloadWeight(60),    54);
  assert("50 × 0.9 = 45",              calculateDeloadWeight(50),    45);
  assert("61.25 × 0.9 = 55.125 → 55", calculateDeloadWeight(61.25), 55);
  assert("47.5 × 0.9 = 42.75 → 43",   calculateDeloadWeight(47.5),  43);
});

group("BONUS — intermediate_s1 session types", () => {
  const vol = getNextPrescription(
    {id:"dips",phase:"intermediate_s1",currentWeight:50,stallCount:0,followsExercise:null},
    {sets:[{reps:6,rir:0},{reps:6,rir:0}],sessionType:"heavy"}
  );
  assert("S1 volume session → 0 increment (hold)", vol.increment, 0);

  const pr6 = getNextPrescription(
    {id:"dips",phase:"intermediate_s1",currentWeight:50,stallCount:0,followsExercise:null},
    {sets:[{reps:6,rir:0}],sessionType:"pr"}
  );
  assert("S1 PR: 6 reps → +2.5", pr6.increment, 2.5);

  const pr3 = getNextPrescription(
    {id:"dips",phase:"intermediate_s1",currentWeight:50,stallCount:0,followsExercise:null},
    {sets:[{reps:3,rir:0}],sessionType:"pr"}
  );
  assert("S1 PR: 3 reps → +0.5", pr3.increment, 0.5);

  const pr2 = getNextPrescription(
    {id:"dips",phase:"intermediate_s1",currentWeight:50,stallCount:0,followsExercise:null},
    {sets:[{reps:2,rir:0}],sessionType:"pr"}
  );
  assert("S1 PR: 2 reps → 0, stall", pr2.increment, 0);
  assert("S1 PR: 2 reps → stallDetected", pr2.stallDetected, true);
});

group("BONUS — intermediate_s2 missed reps", () => {
  const m1 = getNextPrescription(
    {id:"dips",phase:"intermediate_s2",currentWeight:60,stallCount:0,followsExercise:null},
    {sets:[{reps:5,rir:0},{reps:5,rir:0},{reps:5,rir:-1}],sessionType:"heavy"}
  );
  assert("S2: missed 1 rep in 1 set → +0.5", m1.increment, 0.5);

  const m2 = getNextPrescription(
    {id:"dips",phase:"intermediate_s2",currentWeight:60,stallCount:0,followsExercise:null},
    {sets:[{reps:5,rir:0},{reps:5,rir:-1},{reps:5,rir:-1}],sessionType:"heavy"}
  );
  assert("S2: missed 1 rep in 2+ sets → 0 increment",  m2.increment, 0);
  assert("S2: missed 1 rep in 2+ sets → stallDetected", m2.stallDetected, true);
});

// ── RENDER RESULTS ──────────────────────────────────────────

const output = document.getElementById("output");

groups.forEach(g => {
  const div = document.createElement("div");
  div.className = "group";

  const gPass = g.tests.filter(t => t.ok).length;
  const gFail = g.tests.filter(t => !t.ok).length;
  const hdr = document.createElement("div");
  hdr.className = "group-header";
  hdr.textContent = `${g.name}  ·  ${gPass}✅  ${gFail > 0 ? gFail + "❌" : ""}`;
  div.appendChild(hdr);

  g.tests.forEach(t => {
    const row = document.createElement("div");
    row.className = `test ${t.ok ? "pass" : "fail"}`;

    const icon = document.createElement("span");
    icon.className = "icon";
    icon.textContent = t.ok ? "✅" : "❌";

    const body = document.createElement("div");
    const label = document.createElement("div");
    label.className = "label";
    label.textContent = t.label;

    const detail = document.createElement("div");
    detail.className = "detail";
    if (t.ok) {
      detail.textContent = `got: ${JSON.stringify(t.actual)}`;
    } else {
      detail.textContent = `expected: ${JSON.stringify(t.expected)}  ·  got: ${JSON.stringify(t.actual)}`;
    }

    body.appendChild(label);
    body.appendChild(detail);
    row.appendChild(icon);
    row.appendChild(body);
    div.appendChild(row);
  });

  output.appendChild(div);
});

// Summary badges
const summary = document.getElementById("summary");
summary.innerHTML = `
  <span class="badge total">Total: ${totalPass + totalFail}</span>
  <span class="badge pass">✅ Pass: ${totalPass}</span>
  ${totalFail > 0 ? `<span class="badge fail">❌ Fail: ${totalFail}</span>` : ""}
`;

// Footer
const footer = document.getElementById("footer");
footer.innerHTML = `<div class="footer ${totalFail === 0 ? "all-pass" : "has-fail"}">
  ${totalFail === 0 ? "✅ ALL TESTS COMPLETE — ENGINE READY" : `❌ ${totalFail} TEST(S) FAILED — CHECK ABOVE`}
</div>`;

if (totalFail === 0) {
  console.log("\n════════════════════════════════════════");
  console.log("         ALL TESTS COMPLETE");
  console.log("════════════════════════════════════════\n");
}
</script>
</body>
</html>
